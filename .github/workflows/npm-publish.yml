name: Publish NPM Plugin

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .opencode/plugins/boomerang

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          TAG="${{ github.ref_name }}"
          echo "Tag: $TAG"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid tag format. Expected v*.*.* (e.g., v1.2.3)"
            exit 1
          fi
          echo "Tag format validated"

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          scope: '@veedubin'

      - name: Verify working directory
        run: |
          if [ ! -d ".opencode/plugins/boomerang" ]; then
            echo "ERROR: Plugin directory not found at .opencode/plugins/boomerang"
            exit 1
          fi
          echo "Plugin directory verified"

      - name: Install dependencies
        run: |
          cd .opencode/plugins/boomerang
          npm install

      - name: Run typecheck
        run: |
          cd .opencode/plugins/boomerang
          npm run typecheck

      - name: Build
        run: |
          cd .opencode/plugins/boomerang
          npm run build

      - name: Verify dist exists
        run: |
          if [ ! -d ".opencode/plugins/boomerang/dist" ]; then
            echo "ERROR: dist directory not found after build"
            exit 1
          fi
          echo "Build output verified"

      - name: Publish to NPM
        run: |
          cd .opencode/plugins/boomerang
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}