name: Release

# Publishing strategy:
#   - PyPI (this workflow): publishes the `opencode-boomerang` Python installer wrapper
#     (pip/uv installable) which bundles agents, skills, and plugin assets.
#   - NPM  (npm-publish.yml): publishes the `@veedubin/opencode-boomerang` TypeScript
#     plugin package located at .opencode/plugins/boomerang/ for direct JS/TS consumers.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          TAG="${{ github.ref_name }}"
          echo "Tag: $TAG"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid tag format. Expected v*.*.* (e.g., v1.2.3)"
            exit 1
          fi
          echo "Tag format validated"

  build:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build hatchling

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify dist directory
        run: |
          if [ ! -d "dist" ] || [ -z "$(ls -A dist/)" ]; then
            echo "ERROR: dist directory is empty or missing"
            exit 1
          fi
          echo "Build artifacts verified"

      - name: Create boomerang.tar.gz
        run: |
          set -e

          ASSETS_DIR="src/opencode_boomerang/assets/.opencode"

          if [ ! -d "$ASSETS_DIR" ]; then
            echo "ERROR: Assets directory not found: $ASSETS_DIR"
            exit 1
          fi

          echo "Creating tarball from $ASSETS_DIR"
          tar -czf boomerang.tar.gz -C src/opencode_boomerang/assets .opencode
          
          if [ ! -f boomerang.tar.gz ]; then
            echo "ERROR: Failed to create boomerang.tar.gz"
            exit 1
          fi

          echo "Tarball created successfully:"
          ls -la boomerang.tar.gz

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload release tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball
          path: boomerang.tar.gz

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/opencode-boomerang
    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Verify wheel exists
        run: |
          if [ ! -f "dist/"*.whl ]; then
            echo "ERROR: No wheel file found in dist/"
            exit 1
          fi
          echo "Wheel file verified"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Download release tarball
        uses: actions/download-artifact@v4
        with:
          name: release-tarball
          path: .

      - name: Verify release assets
        run: |
          set -e
          echo "=== Release Assets ==="
          ls -la dist/
          ls -la boomerang.tar.gz || true

          if [ ! -f "boomerang.tar.gz" ]; then
            echo "ERROR: boomerang.tar.gz not found"
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## What's New in ${{ github.ref_name }}

            This release includes the latest Boomerang plugin for OpenCode.

            ### Installation

            Install from PyPI:
            ```bash
            pip install opencode-boomerang
            # Or using uv
            uv tool install opencode-boomerang
            ```

            Or use the "Vanilla OpenCode Install" prompt from the [README](README.md).

            ### Manual Install

            Download and extract `boomerang.tar.gz` to your project directory:
            ```bash
            tar -xzf boomerang.tar.gz -C /your/project/
            ```

          files: |
            dist/*.whl
            boomerang.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}