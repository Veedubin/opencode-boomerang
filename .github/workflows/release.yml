name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build hatchling

      - name: Build wheel and sdist
        run: python -m build

      - name: Create boomerang.tar.gz
        run: |
          tar -czf boomerang.tar.gz -C src/opencode_boomerang/assets/.opencode agents/ skills/ plugins/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload release tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball
          path: boomerang.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Download release tarball
        uses: actions/download-artifact@v4
        with:
          name: release-tarball
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## What's New in ${{ github.ref_name }}

            This release includes the latest Boomerang plugin for OpenCode.

            ### Installation

            Install from PyPI:
            ```bash
            pip install opencode-boomerang
            # Or using uv
            uv tool install opencode-boomerang
            ```

            Or use the "Vanilla OpenCode Install" prompt from the [README](README.md).

            ### Manual Install

            Download and extract `boomerang.tar.gz` to your project directory:
            ```bash
            tar -xzf boomerang.tar.gz -C /your/project/
            ```

          files: |
            dist/*.whl
            dist/*.tar.gz
            boomerang.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
