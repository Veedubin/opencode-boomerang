name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          TAG="${{ github.ref_name }}"
          echo "Tag: $TAG"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid tag format. Expected v*.*.* (e.g., v1.2.3)"
            exit 1
          fi
          echo "Tag format validated"

  build:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create boomerang.tar.gz
        run: |
          set -e

          ASSETS_DIR="packages/opencode-plugin"

          if [ ! -d "$ASSETS_DIR" ]; then
            echo "ERROR: Assets directory not found: $ASSETS_DIR"
            exit 1
          fi

          echo "Creating tarball from $ASSETS_DIR"
          tar -czf boomerang.tar.gz -C packages opencode-plugin
          
          if [ ! -f boomerang.tar.gz ]; then
            echo "ERROR: Failed to create boomerang.tar.gz"
            exit 1
          fi

          echo "Tarball created successfully:"
          ls -la boomerang.tar.gz

      - name: Upload release tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball
          path: boomerang.tar.gz

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release tarball
        uses: actions/download-artifact@v4
        with:
          name: release-tarball
          path: .

      - name: Verify release assets
        run: |
          set -e
          echo "=== Release Assets ==="
          ls -la boomerang.tar.gz || true

          if [ ! -f "boomerang.tar.gz" ]; then
            echo "ERROR: boomerang.tar.gz not found"
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## What's New in ${{ github.ref_name }}

            This release includes the latest Boomerang multi-agent orchestration plugin for OpenCode.

            ### Installation

            Install from NPM:
            ```bash
            npm install @veedubin/opencode-boomerang
            ```

            Or download and extract `boomerang.tar.gz` to your project:
            ```bash
            tar -xzf boomerang.tar.gz -C /your/project/
            ```

          files: |
            boomerang.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
