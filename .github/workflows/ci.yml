name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build hatchling

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify wheel contains .opencode assets
        run: |
          echo "Wheel contents:"
          unzip -l dist/*.whl | grep -E "(\.opencode|agents|skills|plugins)" | head -30
          
          # Verify .opencode assets are in the wheel
          if ! unzip -l dist/*.whl | grep -q "\.opencode"; then
            echo "ERROR: .opencode assets not found in wheel"
            exit 1
          fi
          echo "Wheel assets verified"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
