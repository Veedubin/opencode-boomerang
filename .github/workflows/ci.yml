name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build hatchling

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify dist directory exists
        run: |
          if [ ! -d "dist" ] || [ -z "$(ls -A dist/)" ]; then
            echo "ERROR: dist directory is empty or missing"
            exit 1
          fi
          echo "Dist directory verified"

      - name: Verify wheel contains .opencode assets
        run: |
          set -e

          echo "=== Wheel contents ==="
          if ! ls dist/*.whl >/dev/null 2>&1; then
            echo "ERROR: No wheel file found in dist/"
            ls -la dist/
            exit 1
          fi

          WHEEL_FILE=$(ls dist/*.whl | head -1)
          echo "Found wheel: $WHEEL_FILE"

          echo ""
          echo "=== Checking for .opencode assets ==="
          unzip -l "dist/$WHEEL_FILE" | grep -E "(\.opencode|agents/|skills/|plugins/)" || true

          echo ""
          echo "=== Verification ==="
          if ! unzip -l "dist/$WHEEL_FILE" | grep -q "\.opencode"; then
            echo "ERROR: .opencode assets not found in wheel"
            echo "Full wheel contents:"
            unzip -l "dist/$WHEEL_FILE"
            exit 1
          fi
          echo "SUCCESS: Wheel contains .opencode assets"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/