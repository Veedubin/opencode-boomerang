name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-root:
    runs-on: ubuntu-latest
    name: Test Root Package

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify vitest installation
        run: bun vitest --version || ls node_modules/vitest

      - name: Build
        run: bun run build

      - name: Run typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run test -- --run

  test-plugin:
    runs-on: ubuntu-latest
    name: Test Plugin Package
    defaults:
      run:
        working-directory: packages/opencode-plugin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Verify build
        run: bun run build

      - name: Verify dist exists
        run: |
          if [ ! -d "dist" ]; then
            echo "ERROR: dist directory not found after build"
            exit 1
          fi
          echo "Build output verified"
