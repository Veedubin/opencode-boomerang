name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-root:
    runs-on: ubuntu-latest
    name: Test Root Package
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Verify version
        run: |
          cat package.json | grep '"version"'
          cat package.json | grep '"test"'

      - name: Build
        run: npm run build

      - name: Run typecheck
        run: npm run typecheck

      - name: Run critical tests
        run: npm run test -- --run

  test-plugin:
    runs-on: ubuntu-latest
    name: Test Plugin Package
    defaults:
      run:
        working-directory: packages/opencode-plugin
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Verify version
        run: |
          cat package.json | grep '"version"'
          cat package.json | grep '"test"'

      - name: Run typecheck
        run: npm run typecheck

      - name: Run critical tests
        run: npm run test -- --run

      - name: Verify build
        run: npm run build

      - name: Verify dist exists
        run: |
          if [ ! -d "dist" ]; then
            echo "ERROR: dist directory not found after build"
            exit 1
          fi
          echo "Build output verified"
