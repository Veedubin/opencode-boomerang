name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-root:
    runs-on: ubuntu-latest
    name: Test Root Package

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify vitest installation
        run: |
          echo "=== node_modules/vitest ==="
          ls -la node_modules/vitest/package.json || echo "MISSING: vitest package.json"
          echo "=== npm ls ==="
          npm ls vitest
          echo "=== ESM resolution test ==="
          node --input-type=module -e "import('vitest/config').then(() => console.log('ESM OK')).catch(e => { console.error('ESM FAIL:', e.message); process.exit(1) })"

      - name: Build
        run: npm run build

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test -- --run

  test-plugin:
    runs-on: ubuntu-latest
    name: Test Plugin Package
    defaults:
      run:
        working-directory: packages/opencode-plugin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify vitest is installed
        run: npm ls vitest

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Verify build
        run: npm run build

      - name: Verify dist exists
        run: |
          if [ ! -d "dist" ]; then
            echo "ERROR: dist directory not found after build"
            exit 1
          fi
          echo "Build output verified"